name: Update ETF Ranking

on:
  schedule:
    - cron: '0 2 * * 1'  # 매주 월요일 UTC 02:00 (KST 11:00)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch ETF ranking and store to KV
        env:
          WORKER_URL: https://asset-dashboard-api.jilliankim200.workers.dev
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os, sys
          from datetime import datetime, timezone, timedelta

          WORKER_URL = os.environ['WORKER_URL']
          API_BASE = 'https://search-etf.com/backend/api/v2/get_monthly_etf.php'
          HEADERS = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
              'Accept': 'application/json',
              'Referer': 'https://search-etf.com/month_dividend.php',
          }

          all_data = []
          page = 1

          while page <= 10:
              url = f'{API_BASE}?page={page}&limit=50&sortBy=dividend_rate&sortOrder=desc'
              req = urllib.request.Request(url, headers=HEADERS)
              try:
                  with urllib.request.urlopen(req, timeout=15) as resp:
                      raw = resp.read().decode('utf-8')
                      print(f'HTTP {resp.status}, 응답 앞 200자: {raw[:200]}')
                      body = json.loads(raw)
              except Exception as e:
                  print(f'페이지 {page} 요청 실패: {e}')
                  break

              if not body.get('success'):
                  print(f'페이지 {page} 응답 실패')
                  break

              items = body.get('data', [])
              if not items:
                  break

              for e in items:
                  all_data.append({
                      'rank': len(all_data) + 1,
                      'name': e.get('stock_name', ''),
                      'ticker': e.get('stock_code', ''),
                      'price': e.get('current_price') or e.get('price') or 0,
                      'priceChange': e.get('price_change') or e.get('prdy_vrss') or 0,
                      'priceChangeRate': e.get('price_change_rate') or 0,
                      'recentDividend': e.get('latest_dividend') or 0,
                      'annualYield': e.get('dividend_rate_1year') or e.get('dividend_rate') or 0,
                      'singleDividendRate': e.get('single_dividend_rate') or 0,
                      'actualDividendDate': e.get('actual_dividend_date') or '',
                      'dividendTiming': e.get('dividend_timing') or '',
                      'retirementOk': e.get('retirement_pension_investment_limit') == '100%',
                      'personalPension': str(e.get('personal_pension_verification', '')).lower() == 'true',
                  })

              print(f'페이지 {page}: {len(items)}개 수집 (누계 {len(all_data)}개)')

              if not body.get('pagination', {}).get('has_more'):
                  break
              page += 1

          if not all_data:
              print('데이터 없음, 종료')
              sys.exit(1)

          kst = timezone(timedelta(hours=9))
          now = datetime.now(kst)
          updated_at = now.strftime('%Y년 %-m월 %-d일')

          payload = json.dumps({'data': all_data, 'updatedAt': updated_at}, ensure_ascii=False)

          put_req = urllib.request.Request(
              f'{WORKER_URL}/kv/etf_ranking',
              data=payload.encode('utf-8'),
              headers={'Content-Type': 'application/json'},
              method='PUT'
          )
          try:
              with urllib.request.urlopen(put_req, timeout=15) as resp:
                  result = json.loads(resp.read())
                  print(f'KV 저장 성공: {len(all_data)}개, {updated_at}')
                  print(f'응답: {result}')
          except Exception as e:
              print(f'KV 저장 실패: {e}')
              sys.exit(1)
          PYEOF
