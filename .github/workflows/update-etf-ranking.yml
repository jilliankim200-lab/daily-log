name: Update ETF Ranking

on:
  schedule:
    - cron: '0 2 * * 1'  # 매주 월요일 UTC 02:00 (KST 11:00)
  workflow_dispatch:       # 수동 실행 가능

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch ETF ranking and store to KV
        env:
          WORKER_URL: https://asset-dashboard-api.jilliankim200.workers.dev
        run: |
          echo "ETF 랭킹 데이터 수집 시작..."

          ALL_DATA="[]"
          PAGE=1
          LIMIT=50

          while true; do
            RESPONSE=$(curl -s \
              -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              -H "Accept: application/json" \
              -H "Referer: https://search-etf.com/month_dividend.php" \
              "https://search-etf.com/backend/api/v2/get_monthly_etf.php?page=${PAGE}&limit=${LIMIT}&sortBy=dividend_rate&sortOrder=desc")

            SUCCESS=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('success','false'))" 2>/dev/null)
            if [ "$SUCCESS" != "True" ] && [ "$SUCCESS" != "true" ]; then
              echo "페이지 ${PAGE} 응답 실패, 종료"
              break
            fi

            ITEMS=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          items = d.get('data', [])
          print(len(items))
          ")

            if [ "$ITEMS" = "0" ]; then
              echo "더 이상 데이터 없음"
              break
            fi

            # 데이터 파싱 및 누적
            PARSED=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          items = d.get('data', [])
          result = []
          for e in items:
              result.append({
                  'rank': e.get('index', 0),
                  'name': e.get('stock_name', ''),
                  'ticker': e.get('stock_code', ''),
                  'price': e.get('current_price', e.get('price', 0)),
                  'priceChange': e.get('price_change', e.get('prdy_vrss', 0)),
                  'priceChangeRate': e.get('price_change_rate', 0),
                  'recentDividend': e.get('latest_dividend', 0),
                  'annualYield': e.get('dividend_rate_1year', e.get('dividend_rate', 0)),
                  'singleDividendRate': e.get('single_dividend_rate', 0),
                  'actualDividendDate': e.get('actual_dividend_date', ''),
                  'dividendTiming': e.get('dividend_timing', ''),
                  'retirementOk': e.get('retirement_pension_investment_limit') == '100%',
                  'personalPension': str(e.get('personal_pension_verification', '')).lower() == 'true',
              })
          print(json.dumps(result, ensure_ascii=False))
          ")

            ALL_DATA=$(python3 -c "
          import sys, json
          existing = json.loads('$ALL_DATA')
          new_items = json.loads(sys.argv[1])
          existing.extend(new_items)
          print(json.dumps(existing, ensure_ascii=False))
          " "$PARSED")

            HAS_MORE=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('pagination',{}).get('has_more', False))" 2>/dev/null)
            if [ "$HAS_MORE" != "True" ] && [ "$HAS_MORE" != "true" ]; then
              break
            fi

            PAGE=$((PAGE + 1))
            if [ "$PAGE" -gt 10 ]; then
              echo "최대 페이지 도달"
              break
            fi

            sleep 1
          done

          TOTAL=$(echo "$ALL_DATA" | python3 -c "import sys,json; print(len(json.load(sys.stdin)))")
          echo "수집 완료: ${TOTAL}개"

          # 업데이트 날짜 (한국어)
          UPDATED_AT=$(python3 -c "
          from datetime import datetime, timezone, timedelta
          kst = timezone(timedelta(hours=9))
          now = datetime.now(kst)
          print(now.strftime('%Y년 %-m월 %-d일'))
          ")

          # KV에 저장
          PAYLOAD=$(python3 -c "
          import sys, json
          data = json.loads(sys.argv[1])
          result = {'data': data, 'updatedAt': '$UPDATED_AT'}
          print(json.dumps(result, ensure_ascii=False))
          " "$ALL_DATA")

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X PUT \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "${WORKER_URL}/kv/etf_ranking")

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "KV 저장 성공: ${TOTAL}개, ${UPDATED_AT}"
          else
            echo "KV 저장 실패: HTTP ${HTTP_STATUS}"
            exit 1
          fi
