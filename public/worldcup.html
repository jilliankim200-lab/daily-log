<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FIFA 월드컵 2026 · 대시보드</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --fifa-black:   #050a14;
      --fifa-navy:    #0a1628;
      --fifa-blue:    #00a3e0;
      --fifa-red:     #c8102e;
      --fifa-gold:    #d4a017;
      --fifa-white:   #f0f4f8;
      --fifa-dim:     #8899aa;
      --card-bg:      #0f1e30;
      --card-border:  #1a2f48;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--fifa-black);
      color: var(--fifa-white);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
    }

    /* ── HERO HEADER ── */
    .hero {
      position: relative;
      background: linear-gradient(135deg, #050a14 0%, #0a1628 40%, #0d2040 70%, #050a14 100%);
      border-bottom: 1px solid #1a2f48;
      overflow: hidden;
      padding: 0 24px;
    }
    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 60% 80% at 80% 50%, rgba(0,163,224,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 20% 50%, rgba(200,16,46,0.08) 0%, transparent 70%);
    }
    .hero-inner {
      position: relative;
      max-width: 1200px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 0;
      gap: 24px;
    }
    .hero-left { display: flex; align-items: center; gap: 20px; }
    .trophy-icon {
      font-size: 60px; line-height: 1;
      filter: drop-shadow(0 0 20px rgba(212,160,23,0.6));
    }
    .hero-title-block {}
    .hero-eyebrow {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px; font-weight: 700; letter-spacing: 0.2em;
      color: var(--fifa-blue); text-transform: uppercase;
      margin-bottom: 2px;
    }
    .hero-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(35px, 5vw, 53px);
      letter-spacing: 0.04em;
      line-height: 1;
      background: linear-gradient(135deg, #fff 30%, var(--fifa-blue) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .hero-subtitle {
      font-size: 15px; color: var(--fifa-dim); margin-top: 4px;
      letter-spacing: 0.08em;
    }
    .hero-right { display: flex; gap: 12px; flex-shrink: 0; }
    .badge {
      padding: 6px 16px; border-radius: 20px;
      font-size: 15px; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .badge-stage {
      background: rgba(0,163,224,0.15);
      border: 1px solid rgba(0,163,224,0.4);
      color: var(--fifa-blue);
    }
    .badge-day {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--fifa-dim);
    }
    .host-flags {
      display: flex; align-items: center; gap: 6px;
      font-size: 25px;
      border-left: 1px solid #1a2f48; padding-left: 16px; margin-left: 4px;
    }

    /* ── MAIN LAYOUT ── */
    .main {
      max-width: 1200px; margin: 0 auto;
      padding: 28px 24px 60px;
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 24px;
    }
    @media (max-width: 900px) {
      .main { grid-template-columns: 1fr; }
    }

    /* ── SECTION LABEL ── */
    .section-label {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px;
    }
    .section-label-line {
      width: 3px; height: 16px; border-radius: 2px;
    }
    .section-label-text {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px; font-weight: 700; letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    .section-label-count {
      font-size: 14px; color: var(--fifa-dim);
      background: rgba(255,255,255,0.06); border-radius: 10px;
      padding: 1px 8px;
    }

    /* ── MATCH CARD ── */
    .match-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      margin-bottom: 12px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .match-card:hover { border-color: #2a4060; }
    .match-card.live { border-left: 3px solid var(--fifa-red); }
    .match-card.upcoming { border-left: 3px solid #1a2f48; }

    .match-header {
      display: flex; align-items: center;
      padding: 16px 20px 0;
      gap: 6px;
    }
    .match-group-tag {
      font-size: 13px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--fifa-dim);
      background: rgba(255,255,255,0.05); border-radius: 4px;
      padding: 2px 7px;
    }
    .match-live-tag {
      font-size: 13px; font-weight: 800; letter-spacing: 0.1em;
      color: #fff; background: var(--fifa-red);
      border-radius: 4px; padding: 2px 8px;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    .match-time {
      font-size: 14px; color: var(--fifa-dim); margin-left: auto;
    }

    .match-body {
      display: flex; align-items: center;
      padding: 14px 20px;
      gap: 12px;
    }
    .team-side { flex: 1; }
    .team-side.home { text-align: right; }
    .team-side.away { text-align: left; }
    .team-flag { font-size: 35px; display: block; margin-bottom: 4px; }
    .team-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 23px; font-weight: 700; letter-spacing: 0.02em;
    }
    .team-rank { font-size: 13px; color: var(--fifa-dim); margin-top: 1px; }

    .score-center { text-align: center; min-width: 90px; flex-shrink: 0; }
    .score-live {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 45px; letter-spacing: 0.04em;
      color: #fff; line-height: 1;
    }
    .score-sep { color: var(--fifa-dim); margin: 0 4px; }
    .score-predicted {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px; color: var(--fifa-dim);
      margin-top: 2px;
    }
    .score-kickoff {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 28px; font-weight: 700; color: var(--fifa-dim); line-height: 1;
    }

    /* 승률 바 */
    .win-bar-wrap { padding: 0 20px 12px; }
    .win-bar-labels {
      display: flex; justify-content: space-between;
      font-size: 14px; color: var(--fifa-dim); margin-bottom: 5px;
    }
    .win-bar-labels .home-pct { color: var(--fifa-blue); font-weight: 700; }
    .win-bar-labels .away-pct { color: #c8a0ff; font-weight: 700; }
    .win-bar {
      height: 4px; border-radius: 2px;
      background: #1a2f48;
      display: flex; overflow: hidden;
    }
    .win-bar-home { background: var(--fifa-blue); }
    .win-bar-draw { background: #2a4060; }
    .win-bar-away { background: #7c3aed; }

    /* 관전포인트 */
    .watch-points {
      padding: 12px 20px 16px;
      border-top: 1px solid #1a2f48;
      background: rgba(0,0,0,0.2);
    }
    .watch-points-label {
      font-size: 13px; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--fifa-gold);
      margin-bottom: 6px;
    }
    .watch-points-text {
      font-size: 16px; color: #aabbc8; line-height: 1.65;
    }
    .key-player {
      margin-top: 6px; font-size: 14px;
      color: var(--fifa-dim);
    }
    .key-player span { color: var(--fifa-blue); font-weight: 600; }

    /* ── 사이드바: 조별 순위 ── */
    .sidebar-section { margin-bottom: 28px; }

    /* 조 탭 */
    .group-tabs {
      display: flex; flex-wrap: wrap; gap: 4px;
      margin-bottom: 12px;
    }
    .group-tab {
      padding: 4px 10px; border-radius: 6px;
      font-size: 14px; font-weight: 700; cursor: pointer;
      background: #0f1e30; border: 1px solid #1a2f48;
      color: var(--fifa-dim); transition: all 0.15s;
    }
    .group-tab.active {
      background: var(--fifa-blue); border-color: var(--fifa-blue);
      color: #fff;
    }
    .group-tab:hover:not(.active) { border-color: var(--fifa-blue); color: var(--fifa-blue); }

    /* 순위 테이블 */
    .standings-table {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px; overflow: hidden;
    }
    .st-header {
      display: grid;
      grid-template-columns: 18px 1fr 26px 26px 26px 28px 34px;
      padding: 8px 14px;
      font-size: 13px; font-weight: 700; letter-spacing: 0.1em;
      color: var(--fifa-dim); text-transform: uppercase;
      border-bottom: 1px solid #0a1628;
    }
    .st-header span, .st-row span { text-align: center; }
    .st-header span:nth-child(2), .st-row span:nth-child(2) { text-align: left; }
    .st-row {
      display: grid;
      grid-template-columns: 18px 1fr 26px 26px 26px 28px 34px;
      padding: 10px 14px;
      font-size: 15px;
      border-bottom: 1px solid #0a1628;
      align-items: center;
      transition: background 0.15s;
    }
    .st-row:last-child { border-bottom: none; }
    .st-row:hover { background: rgba(255,255,255,0.02); }
    .st-rank-qualify { color: #22c55e; font-weight: 700; font-size: 14px; }
    .st-rank-out { color: var(--fifa-dim); font-size: 14px; }
    .st-team { display: flex; align-items: center; gap: 6px; font-weight: 600; }
    .st-team-flag { font-size: 18px; }
    .st-points { font-weight: 800; font-size: 18px; text-align: center; }
    .st-qualify { color: #22c55e; }
    .st-gd-pos { color: #22c55e; }
    .st-gd-neg { color: #f87171; }

    /* ── 핫 플레이어 ── */
    .hot-players-grid {
      display: flex; flex-direction: column; gap: 8px;
    }
    .player-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 12px 14px;
      display: flex; align-items: center; gap: 12px;
      transition: border-color 0.2s;
    }
    .player-card:hover { border-color: #2a4060; }
    .player-rank {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px; color: #1a2f48; min-width: 24px; text-align: center;
    }
    .player-rank.top1 { color: var(--fifa-gold); }
    .player-rank.top2 { color: #94a3b8; }
    .player-rank.top3 { color: #cd7c3a; }
    .player-flag { font-size: 28px; flex-shrink: 0; }
    .player-info { flex: 1; min-width: 0; }
    .player-name { font-weight: 700; font-size: 16px; }
    .player-team { font-size: 14px; color: var(--fifa-dim); margin-top: 1px; }
    .player-stats { display: flex; gap: 10px; flex-shrink: 0; }
    .player-stat { text-align: center; }
    .player-stat-val {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 23px; font-weight: 700; line-height: 1;
    }
    .player-stat-lbl { font-size: 11px; color: var(--fifa-dim); letter-spacing: 0.08em; }
    .goals-val { color: var(--fifa-gold); }
    .assists-val { color: var(--fifa-blue); }

    /* ── 로딩 / 빈 상태 ── */
    .empty-state {
      text-align: center; padding: 60px 20px;
      color: var(--fifa-dim);
    }
    .empty-icon { font-size: 60px; margin-bottom: 12px; opacity: 0.4; }
    .empty-title { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
    .empty-desc { font-size: 16px; line-height: 1.6; }
    .empty-cmd {
      display: inline-block; margin-top: 14px;
      background: #0f1e30; border: 1px solid #1a2f48;
      border-radius: 8px; padding: 8px 18px;
      font-family: monospace; font-size: 16px; color: var(--fifa-blue);
    }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #1a2f48;
      border-top-color: var(--fifa-blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 60px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── UPDATED AT ── */
    .updated-at {
      font-size: 13px; color: var(--fifa-dim);
      text-align: center; margin-top: 40px; letter-spacing: 0.06em;
    }
  </style>
</head>
<body>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-inner">
      <div class="hero-left">
        <div class="trophy-icon">🏆</div>
        <div class="hero-title-block">
          <div class="hero-eyebrow">FIFA World Cup™</div>
          <div class="hero-title">CANADA · MEXICO · USA 2026</div>
          <div class="hero-subtitle" id="hero-subtitle">데이터를 불러오는 중...</div>
        </div>
      </div>
      <div class="hero-right">
        <div class="host-flags">🇨🇦 🇲🇽 🇺🇸</div>
        <div class="badge badge-stage" id="badge-stage">—</div>
        <div class="badge badge-day" id="badge-day">—</div>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- LEFT: 오늘 경기 -->
    <div class="left-col">
      <div class="section-label">
        <div class="section-label-line" style="background:var(--fifa-red)"></div>
        <div class="section-label-text" style="color:var(--fifa-red)">Today's Matches</div>
        <div class="section-label-count" id="today-count">0경기</div>
      </div>
      <div id="matches-container">
        <div class="spinner"></div>
      </div>

      <!-- 예정 경기 -->
      <div class="section-label" style="margin-top:28px">
        <div class="section-label-line" style="background:#2a4060"></div>
        <div class="section-label-text" style="color:var(--fifa-dim)">Upcoming</div>
        <div class="section-label-count" id="upcoming-count">0경기</div>
      </div>
      <div id="upcoming-container"></div>
    </div>

    <!-- RIGHT: 조 순위 + 핫 플레이어 -->
    <div class="right-col">

      <!-- 조별 순위 -->
      <div class="sidebar-section">
        <div class="section-label">
          <div class="section-label-line" style="background:var(--fifa-blue)"></div>
          <div class="section-label-text" style="color:var(--fifa-blue)">Group Standings</div>
        </div>
        <div class="group-tabs" id="group-tabs"></div>
        <div id="standings-container"></div>
      </div>

      <!-- 핫 플레이어 -->
      <div class="sidebar-section">
        <div class="section-label">
          <div class="section-label-line" style="background:var(--fifa-gold)"></div>
          <div class="section-label-text" style="color:var(--fifa-gold)">Top Players</div>
        </div>
        <div class="hot-players-grid" id="players-container"></div>
      </div>

    </div>
  </div>

  <div class="updated-at" id="updated-at"></div>

<script>
const WORKER_URL = 'https://asset-dashboard-api.jilliankim200.workers.dev';
let currentGroup = 'A';
let worldcupData = null;

const STAGE_LABELS = {
  group: '조별리그', r32: '32강', r16: '16강',
  qf: '8강', sf: '준결승', final: '결승'
};

const TEAM_KO = {
  'Brazil':'브라질','Argentina':'아르헨티나','France':'프랑스','England':'잉글랜드',
  'Germany':'독일','Spain':'스페인','Portugal':'포르투갈','Netherlands':'네덜란드',
  'Mexico':'멕시코','Canada':'캐나다','United States':'미국','Japan':'일본',
  'South Korea':'한국','Morocco':'모로코','Senegal':'세네갈','Croatia':'크로아티아',
  'Uruguay':'우루과이','Colombia':'콜롬비아','Ecuador':'에콰도르','Chile':'칠레',
  'Italy':'이탈리아','Poland':'폴란드','Denmark':'덴마크','Belgium':'벨기에',
  'Switzerland':'스위스','Serbia':'세르비아','Australia':'호주','Qatar':'카타르',
};

function koName(name) {
  return TEAM_KO[name] || name;
}

function fmtTime(utcDate) {
  if (!utcDate) return '';
  const d = new Date(utcDate);
  return d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: false, timeZone: 'Asia/Seoul' });
}

function renderMatch(m, isUpcoming) {
  const isLive = m.status === 'LIVE' || m.status === 'IN_PLAY';
  const isFinished = m.status === 'FINISHED';
  const pred = m.prediction || {};
  const homeWin = pred.homeWin || 0;
  const draw = pred.draw || 0;
  const awayWin = pred.awayWin || 0;

  const scoreHtml = (isLive || isFinished)
    ? `<div class="score-live">${m.score?.home ?? '-'}<span class="score-sep">·</span>${m.score?.away ?? '-'}</div>
       <div class="score-predicted">${isLive ? '● LIVE' : '종료'}</div>`
    : `<div class="score-kickoff">${fmtTime(m.utcDate)}</div>
       <div class="score-predicted">예측 ${pred.predictedScore || '?-?'}</div>`;

  return `
    <div class="match-card ${isLive ? 'live' : 'upcoming'}">
      <div class="match-header">
        <span class="match-group-tag">${m.group || 'GROUP'}</span>
        ${isLive ? '<span class="match-live-tag">LIVE</span>' : ''}
        <span class="match-time" style="margin-left:auto">${isUpcoming ? fmtTime(m.utcDate) : ''}</span>
      </div>
      <div class="match-body">
        <div class="team-side home">
          <span class="team-flag">${m.homeTeam?.flag || '🏳️'}</span>
          <div class="team-name">${koName(m.homeTeam?.name || '')}</div>
          <div class="team-rank">${m.homeTeam?.fifaRank ? 'FIFA ' + m.homeTeam.fifaRank + '위' : ''}</div>
        </div>
        <div class="score-center">${scoreHtml}</div>
        <div class="team-side away">
          <span class="team-flag">${m.awayTeam?.flag || '🏳️'}</span>
          <div class="team-name">${koName(m.awayTeam?.name || '')}</div>
          <div class="team-rank">${m.awayTeam?.fifaRank ? 'FIFA ' + m.awayTeam.fifaRank + '위' : ''}</div>
        </div>
      </div>
      ${homeWin > 0 ? `
      <div class="win-bar-wrap">
        <div class="win-bar-labels">
          <span class="home-pct">${homeWin}%</span>
          <span style="color:var(--fifa-dim)">${draw}% 무</span>
          <span class="away-pct">${awayWin}%</span>
        </div>
        <div class="win-bar">
          <div class="win-bar-home" style="width:${homeWin}%"></div>
          <div class="win-bar-draw" style="width:${draw}%"></div>
          <div class="win-bar-away" style="width:${awayWin}%"></div>
        </div>
      </div>` : ''}
      ${pred.watchPoints ? `
      <div class="watch-points">
        <div class="watch-points-label">⚡ 관전포인트</div>
        <div class="watch-points-text">${pred.watchPoints}</div>
        ${pred.keyPlayer ? `<div class="key-player">🔑 주목 선수: <span>${pred.keyPlayer}</span></div>` : ''}
      </div>` : ''}
    </div>`;
}

function renderStandings(groupData) {
  if (!groupData) return '<div class="empty-state"><div class="empty-desc">조 데이터 없음</div></div>';
  const rows = groupData.standings.map((s, i) => {
    const qual = i < 2;
    return `<div class="st-row">
      <span class="${qual ? 'st-rank-qualify' : 'st-rank-out'}">${s.rank}</span>
      <span class="st-team"><span class="st-team-flag">${s.team?.flag || ''}</span>${koName(s.team?.name || '')}</span>
      <span>${s.won}</span><span>${s.drawn}</span><span>${s.lost}</span>
      <span class="${s.goalDifference > 0 ? 'st-gd-pos' : s.goalDifference < 0 ? 'st-gd-neg' : ''}">${s.goalDifference > 0 ? '+' : ''}${s.goalDifference}</span>
      <span class="st-points ${qual ? 'st-qualify' : ''}">${s.points}</span>
    </div>`;
  }).join('');
  return `<div class="standings-table">
    <div class="st-header"><span>#</span><span>팀</span><span>W</span><span>D</span><span>L</span><span>GD</span><span>PT</span></div>
    ${rows}
  </div>`;
}

function renderPlayers(players) {
  if (!players?.length) return '<div class="empty-state"><div class="empty-desc">데이터 없음</div></div>';
  return players.slice(0, 6).map((p, i) => `
    <div class="player-card">
      <div class="player-rank ${i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : ''}">${i + 1}</div>
      <div class="player-flag">${p.team?.flag || '🏳️'}</div>
      <div class="player-info">
        <div class="player-name">${p.name}</div>
        <div class="player-team">${koName(p.team?.name || '')}</div>
      </div>
      <div class="player-stats">
        <div class="player-stat">
          <div class="player-stat-val goals-val">${p.goals}</div>
          <div class="player-stat-lbl">골</div>
        </div>
        <div class="player-stat">
          <div class="player-stat-val assists-val">${p.assists}</div>
          <div class="player-stat-lbl">도움</div>
        </div>
      </div>
    </div>`).join('');
}

function selectGroup(g) {
  currentGroup = g;
  document.querySelectorAll('.group-tab').forEach(el => {
    el.classList.toggle('active', el.dataset.group === g);
  });
  const standingsEl = document.getElementById('standings-container');
  if (worldcupData?.groups?.[g]) {
    standingsEl.innerHTML = renderStandings(worldcupData.groups[g]);
  }
}

async function loadData() {
  try {
    const res = await fetch(`${WORKER_URL}/worldcup`);
    if (!res.ok) throw new Error('no data');
    worldcupData = await res.json();
    render();
  } catch {
    showEmpty();
  }
}

function showEmpty() {
  document.getElementById('matches-container').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">⚽</div>
      <div class="empty-title">아직 데이터가 없습니다</div>
      <div class="empty-desc">Claude Code에서 아래 명령을 실행해주세요</div>
      <div class="empty-cmd">월드컵 업데이트해</div>
    </div>`;
  document.getElementById('upcoming-container').innerHTML = '';
  document.getElementById('standings-container').innerHTML = '';
  document.getElementById('players-container').innerHTML = '';
  document.getElementById('badge-stage').textContent = '—';
  document.getElementById('badge-day').textContent = '—';
  document.getElementById('hero-subtitle').textContent = '데이터 없음';
}

function render() {
  const d = worldcupData;
  if (!d) return showEmpty();

  // 헤더
  document.getElementById('badge-stage').textContent = STAGE_LABELS[d.stage] || d.stage || '—';
  const dayNum = d.updatedAt ? Math.floor((Date.now() - new Date(d.updatedAt)) / 86400000) : 0;
  document.getElementById('badge-day').textContent = `D+${dayNum}일`;
  const upd = d.updatedAt ? new Date(d.updatedAt).toLocaleString('ko-KR', { timeZone: 'Asia/Seoul' }) : '';
  document.getElementById('hero-subtitle').textContent = `업데이트 ${upd}`;
  if (upd) document.getElementById('updated-at').textContent = `마지막 업데이트: ${upd}`;

  // 오늘 경기
  const today = d.todayMatches || [];
  document.getElementById('today-count').textContent = `${today.length}경기`;
  document.getElementById('matches-container').innerHTML = today.length
    ? today.map(m => renderMatch(m, false)).join('')
    : '<div class="empty-state"><div class="empty-desc">오늘 경기 없음</div></div>';

  // 예정 경기
  const upcoming = d.upcomingMatches || [];
  document.getElementById('upcoming-count').textContent = `${upcoming.length}경기`;
  document.getElementById('upcoming-container').innerHTML = upcoming.length
    ? upcoming.map(m => renderMatch(m, true)).join('')
    : '<div class="empty-state" style="padding:20px"><div class="empty-desc">예정 경기 없음</div></div>';

  // 조 탭
  const groups = Object.keys(d.groups || {}).sort();
  const tabsEl = document.getElementById('group-tabs');
  tabsEl.innerHTML = groups.map(g =>
    `<button class="group-tab${g === currentGroup ? ' active' : ''}" data-group="${g}" onclick="selectGroup('${g}')">${g}조</button>`
  ).join('');
  selectGroup(groups[0] || 'A');

  // 핫 플레이어
  document.getElementById('players-container').innerHTML = renderPlayers(d.hotPlayers);

  // 실시간 폴링 (LIVE 경기 있을 때)
  const hasLive = today.some(m => m.status === 'LIVE' || m.status === 'IN_PLAY');
  if (hasLive) setTimeout(loadData, 30000);
}

loadData();
</script>
</body>
</html>
