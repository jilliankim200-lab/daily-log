<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>국민성장펀드 ETF 트래커</title>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
  :root {
    --bg: #f8fafc; --bg2: #ffffff; --bg3: #f1f5f9;
    --border: #e2e8f0; --text: #0f172a; --text2: #475569; --text3: #94a3b8;
    --profit: #f07178; --loss: #3182F6;
    --shadow: 0 1px 4px rgba(0,0,0,.07);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; min-height: 100vh; }

  .header {
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-title { font-size: 18px; font-weight: 700; }
  .header-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }

  .main { max-width: 900px; margin: 0 auto; padding: 24px 16px; }

  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
  .top-bar h2 { font-size: 15px; font-weight: 600; color: var(--text2); }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer;
    font-size: 13px; font-weight: 600; transition: opacity .15s;
  }
  .btn-primary { background: #3b82f6; color: #fff; }
  .btn-primary:hover { opacity: .85; }
  .btn-sm { padding: 4px 10px; font-size: 12px; border-radius: 6px; }
  .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--bg3); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
    margin-bottom: 32px;
  }

  .card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px; cursor: pointer; transition: box-shadow .15s, transform .1s;
    box-shadow: var(--shadow);
    position: relative;
  }
  .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.10); transform: translateY(-1px); }

  .card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
  .badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 26px; height: 26px; border-radius: 8px;
    font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0;
  }
  .card-label { font-size: 12px; color: var(--text2); margin-top: 2px; }

  .delete-btn {
    background: none; border: none; cursor: pointer; color: var(--text3);
    padding: 2px; border-radius: 4px; transition: color .15s, background .15s;
    display: flex; align-items: center;
  }
  .delete-btn:hover { color: #ef4444; background: #fef2f2; }

  .card-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .card-ticker { font-size: 12px; color: var(--text3); margin-bottom: 12px; }

  .price-row { display: flex; align-items: baseline; justify-content: space-between; }
  .price { font-size: 18px; font-weight: 700; }
  .change { font-size: 13px; font-weight: 600; }
  .up { color: var(--profit); }
  .down { color: var(--loss); }
  .neutral { color: var(--text3); }

  .loading-text { font-size: 12px; color: var(--text3); }

  /* 뉴스 섹션 */
  .news-section { margin-top: 8px; }
  .news-section h3 { font-size: 14px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .news-list { display: flex; flex-direction: column; gap: 8px; }
  .news-link {
    display: flex; align-items: center; gap: 10px;
    background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 14px; text-decoration: none; color: var(--text);
    transition: background .15s, box-shadow .15s;
    box-shadow: var(--shadow);
  }
  .news-link:hover { background: var(--bg3); box-shadow: 0 2px 8px rgba(0,0,0,.08); }
  .news-link span.material-icons { font-size: 18px; color: #3b82f6; flex-shrink: 0; }
  .news-link-text { font-size: 13px; font-weight: 500; }
  .news-link-query { font-size: 11px; color: var(--text3); margin-top: 1px; }

  /* 모달 */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.45); z-index: 999;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2); border-radius: 16px; padding: 24px;
    width: 320px; max-width: 90vw; box-shadow: 0 8px 32px rgba(0,0,0,.15);
  }
  .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
  .field input, .field select {
    width: 100%; padding: 9px 12px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 14px; background: var(--bg3);
    color: var(--text); outline: none; transition: border-color .15s;
  }
  .field input:focus, .field select:focus { border-color: #3b82f6; }
  .modal-actions { display: flex; gap: 8px; margin-top: 4px; }
  .modal-actions .btn { flex: 1; justify-content: center; }

  .refresh-btn {
    background: none; border: 1px solid var(--border); border-radius: 8px;
    padding: 6px 10px; cursor: pointer; color: var(--text2);
    display: flex; align-items: center; gap: 4px; font-size: 12px;
    transition: background .15s;
  }
  .refresh-btn:hover { background: var(--bg3); }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
    .main { padding: 16px 12px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="material-icons" style="color:#3b82f6;font-size:24px">account_balance</span>
    <div>
      <div class="header-title">국민성장펀드 ETF 트래커</div>
      <div class="header-sub">KDB 산업은행 · 5년 150조원 정책펀드 수혜 ETF</div>
    </div>
  </div>
  <button class="refresh-btn" onclick="loadPrices()">
    <span class="material-icons" style="font-size:16px">refresh</span>
    새로고침
  </button>
</div>

<div class="main">
  <div class="top-bar">
    <h2 id="last-updated">가격 로딩 중...</h2>
    <button class="btn btn-primary" onclick="openModal()">
      <span class="material-icons" style="font-size:18px">add</span>
      ETF 추가
    </button>
  </div>

  <div class="grid" id="card-grid"></div>

  <div class="news-section">
    <h3>
      <span class="material-icons" style="font-size:18px;color:#3b82f6">newspaper</span>
      관련 뉴스
    </h3>
    <div class="news-list" id="news-list"></div>
  </div>
</div>

<!-- ETF 추가 모달 -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <h3>ETF 추가</h3>
    <div class="field">
      <label>티커 (6자리)</label>
      <input id="input-ticker" type="text" maxlength="6" placeholder="예: 455850">
    </div>
    <div class="field">
      <label>ETF명</label>
      <input id="input-name" type="text" placeholder="예: SOL AI반도체소부장">
    </div>
    <div class="field">
      <label>분야</label>
      <select id="input-sector">
        <option value="A">A — AI·반도체</option>
        <option value="B">B — 바이오</option>
        <option value="C">C — 콘텐츠</option>
        <option value="D">D — 방산·우주</option>
        <option value="E">E — 이차전지</option>
        <option value="F">F — 로봇</option>
        <option value="G">G — 기타</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="addEtf()">추가</button>
    </div>
  </div>
</div>

<script>
const WORKER_URL = 'https://asset-dashboard-api.jilliankim200.workers.dev';
const LS_KEY = 'ngf_etf_list';

const SECTOR_COLORS = {
  A: '#4FC3F7', B: '#81C784', C: '#FFB74D',
  D: '#E57373', E: '#BA68C8', F: '#4DB6AC', G: '#90A4AE'
};

const SECTOR_LABELS = {
  A: 'AI·반도체', B: '바이오', C: '콘텐츠',
  D: '방산·우주', E: '이차전지', F: '로봇', G: '기타'
};

const DEFAULT_ETFS = [
  { ticker: '455850', name: 'SOL AI반도체소부장',  sector: 'A', label: 'AI·반도체' },
  { ticker: '261250', name: 'KODEX 바이오',        sector: 'B', label: '바이오' },
  { ticker: '475050', name: 'ACE KPOP포커스',      sector: 'C', label: '콘텐츠' },
  { ticker: '421320', name: 'PLUS 우주항공&UAM',   sector: 'D', label: '방산·우주' },
  { ticker: '455860', name: 'SOL 2차전지소부장Fn', sector: 'E', label: '이차전지' },
  { ticker: '445290', name: 'KODEX 로봇액티브',    sector: 'F', label: '로봇' },
];

const NEWS_LINKS = [
  { title: '국민성장펀드 최신 뉴스',    query: '국민성장펀드' },
  { title: '국민참여형 펀드 가입 안내', query: '국민참여형 국민성장펀드' },
  { title: '반도체 소부장 동향',        query: '반도체 소부장 ETF' },
  { title: '바이오 기술특례 뉴스',      query: '바이오 기술특례 코스닥' },
  { title: '우주·방산 소형주',          query: '우주항공 UAM 주식' },
  { title: '로봇 부품 산업',            query: '로봇 부품 중소형주' },
];

let prices = {};

function loadEtfs() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) return JSON.parse(raw);
  } catch {}
  const seed = DEFAULT_ETFS.map(e => ({ ...e }));
  localStorage.setItem(LS_KEY, JSON.stringify(seed));
  return seed;
}

function saveEtfs(list) {
  localStorage.setItem(LS_KEY, JSON.stringify(list));
}

async function loadPrices() {
  const etfs = loadEtfs();
  const tickers = etfs.map(e => e.ticker);
  document.getElementById('last-updated').textContent = '가격 로딩 중...';
  try {
    const res = await fetch(`${WORKER_URL}/stock-prices-with-change?tickers=${tickers.join(',')}`);
    if (res.ok) {
      prices = await res.json();
      const now = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
      document.getElementById('last-updated').textContent = `기준: ${now}`;
    }
  } catch {
    document.getElementById('last-updated').textContent = '가격 조회 실패';
  }
  renderCards();
}

function renderCards() {
  const etfs = loadEtfs();
  const grid = document.getElementById('card-grid');
  grid.innerHTML = etfs.map((etf, i) => {
    const p = prices[etf.ticker];
    const color = SECTOR_COLORS[etf.sector] || '#90A4AE';
    let priceHtml, changeHtml;
    if (p) {
      const cls = p.changeRate > 0 ? 'up' : p.changeRate < 0 ? 'down' : 'neutral';
      const arrow = p.changeRate > 0 ? '▲' : p.changeRate < 0 ? '▼' : '—';
      priceHtml = `<span class="price">${p.price.toLocaleString()}원</span>`;
      changeHtml = `<span class="change ${cls}">${arrow} ${p.changeRate > 0 ? '+' : ''}${p.changeRate.toFixed(2)}%</span>`;
    } else {
      priceHtml = `<span class="loading-text">조회 중...</span>`;
      changeHtml = '';
    }
    return `
      <div class="card" onclick="handleCardClick('${etf.ticker}', event)">
        <div class="card-header">
          <div>
            <span class="badge" style="background:${color}">${etf.sector}</span>
            <div class="card-label">${etf.label}</div>
          </div>
          <button class="delete-btn" onclick="deleteEtf(${i}, event)" title="삭제">
            <span class="material-icons" style="font-size:18px">close</span>
          </button>
        </div>
        <div class="card-name">${etf.name}</div>
        <div class="card-ticker">${etf.ticker}</div>
        <div class="price-row">
          ${priceHtml}
          ${changeHtml}
        </div>
      </div>`;
  }).join('');
}

function renderNews() {
  const list = document.getElementById('news-list');
  list.innerHTML = NEWS_LINKS.map(n => {
    const url = `https://search.naver.com/search.naver?where=news&query=${encodeURIComponent(n.query)}`;
    return `
      <a class="news-link" href="${url}" target="_blank" rel="noopener noreferrer">
        <span class="material-icons">open_in_new</span>
        <div>
          <div class="news-link-text">${n.title}</div>
          <div class="news-link-query">${n.query}</div>
        </div>
      </a>`;
  }).join('');
}

function handleCardClick(ticker, e) {
  if (e.target.closest('.delete-btn')) return;
  localStorage.setItem('chart_new_tab_ticker', ticker);
  window.open(window.location.origin, '_blank');
}

function deleteEtf(idx, e) {
  e.stopPropagation();
  const etfs = loadEtfs();
  etfs.splice(idx, 1);
  saveEtfs(etfs);
  renderCards();
}

function openModal() {
  document.getElementById('input-ticker').value = '';
  document.getElementById('input-name').value = '';
  document.getElementById('input-sector').value = 'A';
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('input-ticker').focus();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function addEtf() {
  const ticker = document.getElementById('input-ticker').value.trim();
  const name = document.getElementById('input-name').value.trim();
  const sector = document.getElementById('input-sector').value;
  if (!/^\d{6}$/.test(ticker)) { alert('티커는 숫자 6자리를 입력하세요.'); return; }
  if (!name) { alert('ETF명을 입력하세요.'); return; }
  const etfs = loadEtfs();
  etfs.push({ ticker, name, sector, label: SECTOR_LABELS[sector] || sector });
  saveEtfs(etfs);
  closeModal();
  loadPrices();
}

// init
renderCards();
renderNews();
loadPrices();
</script>
</body>
</html>
